name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

env:
  WINDOWS_SIGN_CERT_BASE64: ${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}
  WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
  WINDOWS_SIGN_TIMESTAMP_URL: http://timestamp.digicert.com

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install .[pdf,build]

      - name: Run targeted pytest slice
        run: >
          pytest -q --tb=short
          tests/test_app_paths.py
          tests/test_initial_setup.py
          tests/test_main_startup.py
          tests/test_online_mode.py
          tests/test_bootstrap_migration_verification.py
          tests/test_migrate_json_to_sqlite.py

      - name: Run pyright
        run: npx -y pyright

      - name: Build Windows bundle
        run: pyinstaller --noconfirm FinAccountingApp.spec

      - name: Sign Windows executable
        if: startsWith(github.ref, 'refs/tags/v') && env.WINDOWS_SIGN_CERT_BASE64 != '' && env.WINDOWS_SIGN_CERT_PASSWORD != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $PWD "windows-signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGN_CERT_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) {
            throw "signtool.exe not found"
          }
          & $signtool sign /fd SHA256 /f $certPath /p $env:WINDOWS_SIGN_CERT_PASSWORD /tr $env:WINDOWS_SIGN_TIMESTAMP_URL /td SHA256 "dist\FinAccountingApp\FinAccountingApp.exe"

      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "Inno Setup compiler not found at $iscc"
          }
          & $iscc "FinAccountingApp.iss"

      - name: Sign Windows installer
        if: startsWith(github.ref, 'refs/tags/v') && env.WINDOWS_SIGN_CERT_BASE64 != '' && env.WINDOWS_SIGN_CERT_PASSWORD != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $PWD "windows-signing-cert.pfx"
          if (-not (Test-Path $certPath)) {
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGN_CERT_BASE64))
          }
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) {
            throw "signtool.exe not found"
          }
          $installer = Get-ChildItem "installer_dist\FinAccountingApp-*-setup.exe" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $installer) {
            throw "Installer executable not found"
          }
          & $signtool sign /fd SHA256 /f $certPath /p $env:WINDOWS_SIGN_CERT_PASSWORD /tr $env:WINDOWS_SIGN_TIMESTAMP_URL /td SHA256 $installer

      - name: Archive Windows bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path dist\FinAccountingApp\* -DestinationPath artifacts\FinAccountingApp-windows.zip -Force

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinAccountingApp-windows
          path: artifacts/FinAccountingApp-windows.zip
          if-no-files-found: error

      - name: Upload Windows installer artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: FinAccountingApp-installer
          path: installer_dist/FinAccountingApp-*-setup.exe
          if-no-files-found: error

      - name: Attach Windows assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/FinAccountingApp-windows.zip
            installer_dist/FinAccountingApp-*-setup.exe
