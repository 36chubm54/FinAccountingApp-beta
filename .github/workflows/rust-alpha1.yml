name: Rust Alpha1

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - v3.0.0-alpha
      - v3.0.0-alpha.1
  pull_request:

permissions:
  contents: read

jobs:
  alpha1-seam:
    name: alpha1-seam-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          pip install -r requirements-dev.txt
          pip install .

      - name: Cargo check
        working-directory: rust/ledgera_engine
        run: cargo check

      - name: Cargo test
        working-directory: rust/ledgera_engine
        run: cargo test

      - name: Cargo clippy
        working-directory: rust/ledgera_engine
        run: cargo clippy --all-targets -- -D warnings

      - name: Build Rust extension
        working-directory: rust/ledgera_engine
        run: maturin develop

      - name: Run targeted pytest slice
        env:
          LEDGERA_ENABLE_RUST_CORE: "1"
        run: >
          pytest -q --tb=short
          tests/test_ledgera_bridge.py
          tests/test_money_core_wrapper.py
          tests/test_balance_core_wrapper.py
          tests/test_record_core_wrapper.py
          rust/ledgera_engine/python/tests/test_all.py

      - name: Run forced Python fallback pytest slice
        env:
          LEDGERA_ENABLE_RUST_CORE: "1"
          LEDGERA_FORCE_PYTHON_FALLBACK: "1"
        run: >
          pytest -q --tb=short
          tests/test_ledgera_bridge.py
          tests/test_money_core_wrapper.py
          tests/test_balance_core_wrapper.py
          tests/test_record_core_wrapper.py

      - name: Run pyright
        run: >
          npx -y pyright
          ./bridge
          ./utils/finance/money.py
          ./services/analytics/balance.py
          ./infrastructure/sqlite/records_wallets.py
          ./tests/test_ledgera_bridge.py
          ./rust/ledgera_engine
